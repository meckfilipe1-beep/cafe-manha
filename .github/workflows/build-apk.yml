name: Gerar APK Automaticamente
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Baixar código
        uses: actions/checkout@v6

      - name: Usar Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar tudo
        run: npm ci

      - name: Instalar Capacitor
        run: npm install @capacitor/cli @capacitor/android @capacitor/local-notifications

      - name: 🧹 Apaga Android antigo
        run: rm -rf ./android

      - name: Cria pasta vazia para enganar o copy
        run: mkdir -p ./out

      - name: Adiciona Android
        run: npx cap add android

      - name: ✅ Agora copia sem erro
        run: npx cap copy android || true

      - name: ✅ Atualiza apenas nativos/plugins
        run: npx cap update android

      - name: Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: gradle

      - name: Permissões Gradle
        run: chmod +x ./android/gradlew

      - name: Monta APK
        run: cd android && ./gradlew assembleDebug

      - name: Disponibiliza
        uses: actions/upload-artifact@v5
        with:
          name: Tapicuz-Admin-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk