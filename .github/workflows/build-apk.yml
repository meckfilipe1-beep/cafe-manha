name: Gerar APK Automaticamente
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Baixar código
        uses: actions/checkout@v6

      - name: Usar Node.js 22 (exigido pelo Capacitor 8)
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Capacitor
        run: npm install @capacitor/cli @capacitor/android @capacitor/local-notifications

      - name: 🧹 Apaga pasta Android antiga
        run: rm -rf ./android

      - name: Cria pasta vazia para evitar erro de webDir
        run: mkdir -p ./out

      - name: Adiciona plataforma Android
        run: npx cap add android

      - name: Sincroniza configurações
        run: npx cap sync android

      - name: ✅ Configura JAVA 21 (exigido pelo Capacitor 8)
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle

      - name: Permite execução do Gradle
        run: chmod +x ./android/gradlew

      - name: Gera APK
        run: cd android && ./gradlew assembleDebug

      - name: Disponibiliza para download
        uses: actions/upload-artifact@v5
        with:
          name: Tapicuz-Admin-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk