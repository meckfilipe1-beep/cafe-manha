name: Gerar APK Automaticamente
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Baixar código
        uses: actions/checkout@v6

      - name: Configurar Node.js ✅ Agora versão 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'   # 🎯 Exatamente o que ele pede
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Capacitor
        run: npm install @capacitor/cli @capacitor/android @capacitor/local-notifications

      - name: Preparar Android
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Configurar Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: gradle

      - name: Permitir Gradle
        run: chmod +x ./android/gradlew

      - name: Gerar APK
        run: cd android && ./gradlew assembleDebug

      - name: Disponibilizar APK
        uses: actions/upload-artifact@v5
        with:
          name: Tapicuz-Admin-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk